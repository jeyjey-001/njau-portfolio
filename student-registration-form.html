<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration Form System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #eef2ff, #fdf4ff);
      min-height: 100vh;
      padding: 2rem;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2.3rem;
      font-weight: 800;
      color: #312e81;
    }

    .header p {
      color: #4b5563;
      margin-top: 0.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 1.5rem;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      backdrop-filter: blur(8px);
    }

    .card h2 {
      margin-bottom: 1.2rem;
      font-size: 1.4rem;
      color: #4f46e5;
    }

    .input-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 600;
      font-size: 0.95rem;
    }

    input, select {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 1rem;
      outline: none;
      font-size: 0.95rem;
      transition: 0.2s ease;
    }

    input:focus, select:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
    }

    .btn {
      width: 100%;
      padding: 0.95rem;
      border: none;
      border-radius: 1rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(79, 70, 229, 0.22);
    }

    .message {
      margin-top: 1rem;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .student-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-height: 500px;
      overflow-y: auto;
    }

    .student-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 1rem;
      border-radius: 1rem;
    }

    .student-card h3 {
      color: #111827;
      font-size: 1.05rem;
      margin-bottom: 0.4rem;
    }

    .student-card p {
      color: #4b5563;
      font-size: 0.9rem;
      margin: 0.2rem 0;
    }

    .empty {
      text-align: center;
      color: #6b7280;
      padding: 2rem 1rem;
    }

    .actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1rem;
    }

    .btn-secondary {
      flex: 1;
      padding: 0.8rem;
      border: none;
      border-radius: 1rem;
      background: #ede9fe;
      color: #5b21b6;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-danger {
      flex: 1;
      padding: 0.8rem;
      border: none;
      border-radius: 1rem;
      background: #fee2e2;
      color: #b91c1c;
      font-weight: 700;
      cursor: pointer;
    }

    @media (max-width: 850px) {
      .grid {
        grid-template-columns: 1fr;
      }

      body {
        padding: 1rem;
      }

      .header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Student Registration Form System</h1>
      <p>Register and manage student records in a simple browser-based system.</p>
    </div>

    <div class="grid">
      <!-- Form -->
      <div class="card">
        <h2>Register Student</h2>
        <form id="studentForm">
          <div class="input-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter full name" required />
          </div>

          <div class="input-group">
            <label for="regNo">Registration Number</label>
            <input type="text" id="regNo" placeholder="e.g. ICT/2024/001" required />
          </div>

          <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter email address" required />
          </div>

          <div class="input-group">
            <label for="course">Course</label>
            <select id="course" required>
              <option value="">Select course</option>
              <option>BSc ICT</option>
              <option>BSc Computer Science</option>
              <option>BSc Software Engineering</option>
              <option>Diploma in ICT</option>
            </select>
          </div>

          <div class="input-group">
            <label for="year">Year of Study</label>
            <select id="year" required>
              <option value="">Select year</option>
              <option>Year 1</option>
              <option>Year 2</option>
              <option>Year 3</option>
              <option>Year 4</option>
            </select>
          </div>

          <button type="submit" class="btn">Register Student</button>
          <p class="message" id="formMessage"></p>
        </form>
      </div>

      <!-- Registered Students -->
      <div class="card">
        <h2>Registered Students</h2>
        <div class="student-list" id="studentList"></div>
        <div class="actions">
          <button class="btn-secondary" onclick="downloadStudents()">Download Data</button>
          <button class="btn-danger" onclick="clearStudents()">Clear All</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const studentForm = document.getElementById('studentForm');
    const studentList = document.getElementById('studentList');
    const formMessage = document.getElementById('formMessage');

    let students = JSON.parse(localStorage.getItem('students')) || [];

    function saveStudents() {
      localStorage.setItem('students', JSON.stringify(students));
    }

    function renderStudents() {
      studentList.innerHTML = '';

      if (students.length === 0) {
        studentList.innerHTML = `<div class="empty">No students registered yet.</div>`;
        return;
      }

      students.forEach((student, index) => {
        const card = document.createElement('div');
        card.className = 'student-card';
        card.innerHTML = `
          <h3>${student.fullName}</h3>
          <p><strong>Reg No:</strong> ${student.regNo}</p>
          <p><strong>Email:</strong> ${student.email}</p>
          <p><strong>Course:</strong> ${student.course}</p>
          <p><strong>Year:</strong> ${student.year}</p>
          <button onclick="deleteStudent(${index})" style="margin-top:0.8rem; padding:0.6rem 1rem; border:none; border-radius:0.8rem; background:#fee2e2; color:#b91c1c; font-weight:700; cursor:pointer;">Delete</button>
        `;
        studentList.appendChild(card);
      });
    }

    function deleteStudent(index) {
      students.splice(index, 1);
      saveStudents();
      renderStudents();
    }

    function clearStudents() {
      if (confirm('Are you sure you want to delete all student records?')) {
        students = [];
        saveStudents();
        renderStudents();
      }
    }

    function downloadStudents() {
      if (students.length === 0) {
        alert("No student data to download.");
        return;
      }

      let content = "Full Name,Registration Number,Email,Course,Year\n";
      students.forEach(student => {
        content += `${student.fullName},${student.regNo},${student.email},${student.course},${student.year}\n`;
      });

      const blob = new Blob([content], { type: 'text/csv' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'students.csv';
      link.click();
    }

    studentForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const fullName = document.getElementById('fullName').value.trim();
      const regNo = document.getElementById('regNo').value.trim();
      const email = document.getElementById('email').value.trim();
      const course = document.getElementById('course').value;
      const year = document.getElementById('year').value;

      if (!fullName || !regNo || !email || !course || !year) {
        formMessage.textContent = "⚠️ Please fill in all fields.";
        formMessage.style.color = "#b91c1c";
        return;
      }

      const student = { fullName, regNo, email, course, year };
      students.push(student);
      saveStudents();
      renderStudents();

      formMessage.textContent = "✅ Student registered successfully!";
      formMessage.style.color = "#15803d";

      studentForm.reset();

      setTimeout(() => {
        formMessage.textContent = "";
      }, 3000);
    });

    renderStudents();
  </script>
</body>
</html>
